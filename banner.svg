<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="Cinema AI Toolkit">
  <rect width="1280" height="400" fill="#0B0B0C"/>

  <!-- Motif line-art : forme d'onde audio interrompue puis reparee -->
  <g fill="none" stroke="#3A3A3C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- signal intact -->
    <polyline points="680,200 700,168 720,228 740,178 760,216 780,165 800,230 820,183 840,212 860,200"/>
    <!-- dropout : signal fragmente en tirets -->
    <polyline stroke-dasharray="6 9" points="860,200 880,196 900,203 920,197 940,202 960,198 980,201 1000,200"/>
    <!-- signal restaure -->
    <polyline points="1040,230 1060,176 1080,214 1100,164 1120,232 1140,182 1160,214 1180,172 1200,200"/>
  </g>

  <!-- Point de reparation, accent orange -->
  <g fill="none" stroke="#FF4400" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1000,200 1020,166 1040,230"/>
  </g>
  <circle cx="1000" cy="200" r="4.5" fill="#FF4400"/>

  <!-- Titre -->
  <text x="100" y="190" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="64" letter-spacing="2" fill="#EDEAE3">Cinema AI Toolkit</text>

  <!-- Tagline -->
  <text x="102" y="232" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="400" font-size="22" letter-spacing="0.5" fill="#8F8B84">Voice repair, VHS analysis, archive OCR. Built on real productions.</text>
</svg>
